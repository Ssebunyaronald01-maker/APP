<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Query System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #333;
            font-size: 2em;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 0.9em;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            background: white;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            margin: 20px 0;
            color: #667eea;
            font-weight: 500;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #c33;
            display: none;
        }

        .weather-info {
            margin-top: 30px;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            display: none;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .weather-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .weather-location {
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
        }

        .weather-datetime {
            color: #666;
            font-size: 0.9em;
        }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .weather-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .weather-label {
            color: #888;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .weather-value {
            color: #333;
            font-size: 1.2em;
            font-weight: 600;
        }

        .temperature-large {
            font-size: 2.5em;
            font-weight: 700;
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }

        .weather-desc {
            text-align: center;
            color: #666;
            font-size: 1.1em;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .hint {
            color: #999;
            font-size: 0.8em;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌤️ Weather Query System</h1>
        <p class="subtitle">Enter location, date, and time to get weather information</p>
        
        <form id="weatherForm">
            <div class="form-group">
                <label for="location">📍 Location</label>
                <input type="text" id="location" placeholder="e.g., London, UK" required>
                <div class="hint">City name, optionally with country code</div>
            </div>
            
            <div class="form-group">
                <label for="date">📅 Date</label>
                <input type="date" id="date" required>
                <div class="hint">Today up to 5 days in advance</div>
            </div>
            
            <div class="form-group">
                <label for="time">⏰ Time</label>
                <input type="time" id="time" required>
                <div class="hint">24-hour format (HH:MM)</div>
            </div>
            
            <button type="submit" id="submitBtn">
                <span id="btnText">Get Weather</span>
                <span id="btnSpinner" style="display: none;">⏳</span>
            </button>
        </form>
        
        <div class="loading" id="loading" style="display: none;">
            Fetching weather data...
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="weather-info" id="weatherInfo">
            <div class="weather-header">
                <span class="weather-location" id="weatherLocation"></span>
                <span class="weather-datetime" id="weatherDateTime"></span>
            </div>
            
            <div class="temperature-large" id="weatherTemp"></div>
            <div class="weather-desc" id="weatherDesc"></div>
            
            <div class="weather-grid">
                <div class="weather-item">
                    <div class="weather-label">Feels Like</div>
                    <div class="weather-value" id="weatherFeelsLike"></div>
                </div>
                <div class="weather-item">
                    <div class="weather-label">Humidity</div>
                    <div class="weather-value" id="weatherHumidity"></div>
                </div>
                <div class="weather-item">
                    <div class="weather-label">Wind Speed</div>
                    <div class="weather-value" id="weatherWind"></div>
                </div>
                <div class="weather-item">
                    <div class="weather-label">Pressure</div>
                    <div class="weather-value" id="weatherPressure"></div>
                </div>
                <div class="weather-item">
                    <div class="weather-label">Rain Probability</div>
                    <div class="weather-value" id="weatherRain"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('weatherForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Get form values
            const location = document.getElementById('location').value.trim();
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;
            
            // Validate inputs
            if (!location) {
                showError('Please enter a location');
                return;
            }
            
            if (!date || !time) {
                showError('Please select both date and time');
                return;
            }
            
            // Show loading state
            setLoading(true);
            hideError();
            hideWeatherInfo();
            
            try {
                // Make API request
                const response = await fetch('/weather', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ location, date, time })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayWeather(data.data);
                } else {
                    showError(data.error || 'Failed to fetch weather data');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Failed to connect to server. Please make sure the server is running.');
            } finally {
                setLoading(false);
            }
        });
        
        function displayWeather(weather) {
            document.getElementById('weatherLocation').textContent = weather.location;
            document.getElementById('weatherDateTime').textContent = `${weather.date} ${weather.time}`;
            document.getElementById('weatherTemp').textContent = weather.temperature;
            document.getElementById('weatherDesc').textContent = weather.description;
            document.getElementById('weatherFeelsLike').textContent = weather.feels_like;
            document.getElementById('weatherHumidity').textContent = weather.humidity;
            document.getElementById('weatherWind').textContent = weather.wind_speed;
            document.getElementById('weatherPressure').textContent = weather.pressure;
            document.getElementById('weatherRain').textContent = weather.rain_probability;
            
            document.getElementById('weatherInfo').style.display = 'block';
        }
        
        function setLoading(isLoading) {
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            
            btn.disabled = isLoading;
            btnText.style.display = isLoading ? 'none' : 'inline';
            btnSpinner.style.display = isLoading ? 'inline' : 'none';
            document.getElementById('loading').style.display = isLoading ? 'block' : 'none';
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
        
        function hideError() {
            document.getElementById('error').style.display = 'none';
        }
        
        function hideWeatherInfo() {
            document.getElementById('weatherInfo').style.display = 'none';
        }
        
        // Set default date to today
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').value = today;
            document.getElementById('date').min = today;
            
            // Set max date to 5 days from today
            const maxDate = new Date();
            maxDate.setDate(maxDate.getDate() + 5);
            document.getElementById('date').max = maxDate.toISOString().split('T')[0];
        });
    </script>
</body>
</html>
